<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>23 Nisan AR - Projesi</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Yükleme ekranını ve başlat butonunu özelleştirelim */
      #startButton {
        position: absolute; z-index: 1000; bottom: 40px; left: 50%;
        transform: translateX(-50%); padding: 15px 30px;
        font-size: 18px; font-weight: bold; background-color: #E30A17;
        color: white; border: none; border-radius: 10px; cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-family: sans-serif;
      }
      /* Video yüklenirken kullanıcıyı bilgilendiren küçük bir yazı */
      #loadingHint {
        position: absolute; z-index: 1000; bottom: 15px; left: 50%;
        transform: translateX(-50%); color: white; font-family: sans-serif;
        font-size: 12px; text-shadow: 1px 1px 2px black;
      }
    </style>
  </head>
  <body>

    <button id="startButton">Deneyimi Başlat</button>
    <div id="loadingHint">Video boyutu büyükse yüklenme biraz zaman alabilir...</div>

    <a-scene mindar-image="imageTargetSrc: nisan23.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="nisanVideo" src="nisan23.mp4" 
               preload="metadata" loop crossorigin="anonymous" 
               playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-video src="#nisanVideo" 
                 position="0 0 0" 
                 width="1.65" 
                 height="1" 
                 rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const video = document.querySelector('#nisanVideo');
        const target = document.querySelector('#target');
        const startButton = document.querySelector('#startButton');
        const hint = document.querySelector('#loadingHint');

        // Kullanıcı butona bastığında hem videoyu hem sesi hazırlıyoruz
        startButton.addEventListener('click', () => {
          startButton.style.display = 'none';
          hint.style.display = 'none';
          video.play().then(() => {
            video.pause(); // İzin alındı, şimdi resmin bulunmasını bekliyoruz
          });
        });

        target.addEventListener("targetFound", () => {
          console.log("23 Nisan Resmi Tespit Edildi!");
          video.play();
        });

        target.addEventListener("targetLost", () => {
          video.pause();
        });
      });
    </script>
  </body>
</html>
