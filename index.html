<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>23 Nisan AR Projesi</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      
      /* Başlat Butonu */
      #startButton {
        position: absolute; z-index: 1000; top: 50%; left: 50%;
        transform: translate(-50%, -50%); padding: 20px 40px;
        font-size: 20px; font-weight: bold; background-color: #E30A17;
        color: white; border: none; border-radius: 50px; cursor: pointer;
        box-shadow: 0 0 20px rgba(227, 10, 23, 0.6); font-family: sans-serif;
      }

      /* Yükleme Yazısı (Video büyük olduğu için önemli) */
      #loadingText {
        position: absolute; z-index: 999; top: 65%; left: 50%;
        transform: translateX(-50%); color: white; font-family: sans-serif;
        display: none; text-align: center;
      }
    </style>
  </head>
  <body>

    <button id="startButton">Deneyimi Başlat</button>
    <div id="loadingText">Materyaller Hazırlanıyor... <br> (Video boyutu büyükse biraz sürebilir)</div>

    <a-scene id="ar-scene" 
             mindar-image="imageTargetSrc: nisan23.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="nisanVideo" src="nisan23.mp4" 
               preload="auto" loop crossorigin="anonymous" 
               playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-video src="#nisanVideo" 
                 position="0 0 0" 
                 width="1.65" 
                 height="1" 
                 rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      const sceneEl = document.querySelector('#ar-scene');
      const startButton = document.querySelector('#startButton');
      const loadingText = document.querySelector('#loadingText');
      const video = document.querySelector('#nisanVideo');

      startButton.addEventListener('click', () => {
        // Butonu kaldır ve yükleniyor yazısını göster
        startButton.style.display = 'none';
        loadingText.style.display = 'block';

        // 1. Kamerayı başlat (İzin penceresi şimdi açılacak)
        const { system } = sceneEl;
        system.getService('mindar-image-system').start(); 

        // 2. Videoyu arka planda hazırla
        video.play().then(() => {
          video.pause(); // Sadece izin almak için kısa süreli oynat/dur
          loadingText.style.display = 'none'; // Hazır olduğunda yazıyı kaldır
        }).catch(err => {
          console.error("Video başlatılamadı:", err);
        });
      });

      // Hedef bulunduğunda
      const targetEntity = document.querySelector('#target');
      targetEntity.addEventListener("targetFound", () => {
        video.play();
      });

      // Hedef kaybedildiğinde
      targetEntity.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>
