<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mona Lisa AR Project</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Başlatma Butonu (Tarayıcıların video engeli için gerekli) */
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); display: flex; justify-content: center;
        align-items: center; z-index: 1000; color: white; font-family: sans-serif;
      }
      #ui-overlay button {
        padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none;
      }
    </style>
  </head>

  <body>
    <div id="ui-overlay">
      <button id="startButton">Deneyimi Başlat</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./mona.mind; autoStart: false;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="monaVideo" src="./mona.mp4" 
               preload="auto" loop="true" 
               crossorigin="anonymous" playsinline webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="mona-target" mindar-image-target="targetIndex: 0">
        <a-video src="#monaVideo" 
                 position="0 0 0" 
                 width="1" 
                 height="0.605" 
                 rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#startButton');
      const uiOverlay = document.querySelector('#ui-overlay');
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#monaVideo');

      // Başlat butona tıklandığında AR'ı ve Videoyu tetikle
      startButton.addEventListener('click', () => {
        uiOverlay.style.display = 'none';
        sceneEl.systems["mindar-image-system"].start(); // AR'ı başlat
      });

      // Hedef resim görüldüğünde videoyu oynat, kaybolduğunda durdur
      const monaTarget = document.querySelector('#mona-target');
      monaTarget.addEventListener("targetFound", event => {
        console.log("Mona Lisa bulundu!");
        video.play();
      });

      monaTarget.addEventListener("targetLost", event => {
        console.log("Hedef kayboldu.");
        video.pause();
      });
    </script>
  </body>
</html>
