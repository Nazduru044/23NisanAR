<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        /* Video yüklenene kadar veya hata oluşursa diye basit bir arayüz */
        #scanning-overlay {
            display: flex; align-items: center; justify-content: center;
            position: absolute; left: 0; right: 0; top: 0; bottom: 0;
            background: rgba(0,0,0,0.5); color: white; z-index: 10; font-family: sans-serif;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="scanning-overlay">Resmi Taratın (23 Nisan)</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./nisan23.mind; uiScanning: #scanning-overlay;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="23nisanVideo" src="./nisan23.mp4" 
                preload="auto" loop="true" crossorigin="anonymous" 
                webkit-playsinline playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video id="video-display" src="#23nisanVideo" 
                width="1" height="0.605" 
                position="0 0 0" 
                rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        // Video oynatma mantığı: Resim görüldüğünde başla, kaybolduğunda durdur.
        const video = document.querySelector('#23nisanVideo');
        const sceneEl = document.querySelector('a-scene');
        const targetEntity = document.querySelector('[mindar-image-target]');

        targetEntity.addEventListener("targetFound", event => {
            console.log("Hedef bulundu!");
            video.play();
        });

        targetEntity.addEventListener("targetLost", event => {
            console.log("Hedef kaybedildi.");
            video.pause();
        });

        // Kullanıcı etkileşimi olmadan sesli video oynatılamayabilir (Tarayıcı kısıtlaması)
        // Ekrana ilk tıklandığında sesi açmak veya videoyu başlatmak için:
        window.addEventListener('click', () => {
            video.muted = false; // Sesi açar
        });
    </script>
</body>
</html>
