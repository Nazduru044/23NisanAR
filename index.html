<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23 Nisan AR Projesi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Giriş Ekranı ve Başlat Butonu */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ff4b2b, #ff416c);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; color: white; text-align: center;
        }

        button {
            padding: 15px 35px; font-size: 1.2rem; cursor: pointer;
            background: white; color: #ff4b2b; border: none;
            border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        /* Tarama Göstergesi */
        #scanning-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.3); color: white;
            z-index: 10; align-items: center; justify-content: center;
            pointer-events: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1>23 Nisan AR Deneyimi</h1>
        <p>Lütfen devam etmek için aşağıdaki butona tıkla ve kameraya izin ver.</p>
        <button id="start-btn">DENEYİMİ BAŞLAT</button>
    </div>

    <div id="scanning-overlay">
        <p style="border: 2px solid white; padding: 10px;">Resmi Kameraya Gösterin...</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./nisan23.mind; autoStart: false; uiScanning: #scanning-overlay;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="nisanVideo" src="./nisan23.mp4" 
                preload="auto" loop="true" crossorigin="anonymous" 
                webkit-playsinline playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
            <a-video src="#nisanVideo" 
                width="1" height="0.605" 
                position="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.querySelector('#start-btn');
        const uiOverlay = document.querySelector('#ui-overlay');
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector('#nisanVideo');
        const targetEntity = document.querySelector('#target-entity');

        // Deneyimi Başlat Butonuna Tıklandığında
        startBtn.addEventListener('click', () => {
            uiOverlay.classList.add('hidden'); // Giriş ekranını kapat
            
            // Mind-AR sistemini başlat
            const { systems } = sceneEl;
            systems['mindar-image-system'].start(); 
            
            // Videoyu sessizce arkada yükle/hazırla
            video.play().then(() => {
                video.pause();
                video.currentTime = 0;
            }).catch(e => console.log("Video hazır değil:", e));
        });

        // Hedef Bulunduğunda
        targetEntity.addEventListener("targetFound", () => {
            console.log("23 Nisan Resmi Algılandı!");
            video.play();
        });

        // Hedef Kaybedildiğinde
        targetEntity.addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
