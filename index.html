<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>23 Nisan AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        
        /* Başlat Butonu Tasarımı */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ba2727; /* Türk bayrağı kırmızısına yakın */
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; color: white; text-align: center;
        }

        #start-btn {
            padding: 18px 40px; font-size: 22px; cursor: pointer;
            background: white; color: #ba2727; border: none;
            border-radius: 30px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        /* Yükleniyor Yazısı */
        #loading-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.7);
            padding: 10px 20px; border-radius: 5px;
            display: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-family: sans-serif;">23 Nisan AR Projesi</h1>
        <p>Devam etmek için butona dokunun.</p>
        <button id="start-btn">KAMERAYI AÇ</button>
    </div>

    <div id="loading-text">Kamera ve AR yükleniyor...</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./nisan23.mind; autoStart: false; uiScanning: #loading-text;" 
        embedded
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="nisanVideo" src="./nisan23.mp4" 
                preload="auto" loop="true" crossorigin="anonymous" 
                webkit-playsinline playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video id="video-screen" src="#nisanVideo" 
                width="1" height="0.605" 
                position="0 0 0"
                rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.querySelector('#start-btn');
        const startScreen = document.querySelector('#start-screen');
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector('#nisanVideo');
        const targetEntity = document.querySelector('#target');

        startBtn.addEventListener('click', () => {
            // 1. Giriş ekranını kaldır
            startScreen.style.display = 'none';
            
            // 2. Videoyu sessiz başlat-durdur (Tarayıcı kilidini açar)
            video.play();
            video.pause();
            
            // 3. AR Sistemini başlat
            const { systems } = sceneEl;
            if (systems['mindar-image-system']) {
                systems['mindar-image-system'].start();
            } else {
                console.error("Mind-AR sistemi yüklenemedi!");
            }
        });

        // Takip olayları
        targetEntity.addEventListener("targetFound", () => {
            console.log("Resim bulundu!");
            video.play();
        });

        targetEntity.addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
