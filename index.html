<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mona Lisa AR - Stabil Sürüm</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        
        /* Giriş Ekranı: Yuvarlak dönme sorununu bu buton çözer */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; color: white; font-family: sans-serif;
        }
        #startButton {
            padding: 20px 40px; font-size: 20px; background: #2ecc71;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #startButton:active { transform: scale(0.95); }
        p { margin-top: 15px; font-size: 14px; opacity: 0.8; }
    </style>
</head>

<body>
    <div id="ui-overlay">
        <button id="startButton">KAMERAYI AÇ VE BAŞLAT</button>
        <p>Mona Lisa tablosunu taramak için izin verin.</p>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./mona.mind; autoStart: false; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="monaVideo" src="./mona.mp4" 
               preload="auto" loop="true" 
               crossorigin="anonymous" playsinline webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="mona-target" mindar-image-target="targetIndex: 0">
        <a-video src="#monaVideo" 
                 position="0 0 0" 
                 width="1" 
                 height="0.605" 
                 rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#startButton');
      const uiOverlay = document.querySelector('#ui-overlay');
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#monaVideo');

      // Başlat butonu mekanizması
      startButton.addEventListener('click', () => {
        // 1. Arayüzü gizle
        uiOverlay.style.display = 'none';
        
        // 2. Videoyu "sessiz" bir şekilde önden tetikle (Tarayıcı izni için)
        video.play().then(() => {
            video.pause(); // Sadece yetki aldık, tarama bitene kadar durduruyoruz
        }).catch(err => console.log("Video yetki hatası:", err));

        // 3. AR Sistemini başlat
        sceneEl.systems["mindar-image-system"].start();
      });

      // Hedef Takibi
      const monaTarget = document.querySelector('#mona-target');
      
      monaTarget.addEventListener("targetFound", () => {
        console.log("Tablo bulundu, video başlıyor.");
        video.play();
      });

      monaTarget.addEventListener("targetLost", () => {
        console.log("Tablo kayboldu, video durdu.");
        video.pause();
      });
    </script>
</body>
</html>
